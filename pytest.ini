[pytest]
# Default test suite lives under `tests/`.
#
# Track-local test suites under `tracks/*/tests/` vendor their own `ski_racing`
# package copies and will shadow each other if collected together. Run them
# per-directory when needed, e.g.:
#
#   python -m pytest tracks/E_degraded_safety/tests/
#   python -m pytest tracks/F_viterbi_decoder/tests/
#   python -m pytest tracks/G_initialisation/tests/
#
addopts = -v
testpaths =
    tests
